<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vellovy</title>
    <link rel="icon" href="./assets/favicon-32x32.png">
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiVmVsbG92eSIsInNob3J0X25hbWUiOiJWZWxsb3Z5Iiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiNmZmYiLCJ0aGVtZV9jb2xvciI6IiMyQzE2NTQifQ==">
    <meta name="theme-color" content="#2C1654">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ── Offline Banner ── -->
<div class="offline-banner" id="offline-banner">
    Sem conexão — dados salvos localmente
</div>

<!-- ── Boot Loader ── -->
<div id="boot-loader">
    <div class="spinner"></div>
    <div style="color: var(--plum); font-weight: 500;">Inicializando...</div>
</div>

<!-- ── Login ── -->
<div id="page-login"></div>

<!-- ── App Shell ── -->
<div id="app-shell" class="app-container">

    <aside class="sidebar" id="sidebar">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <div class="logo-text">
                <div style="font-size:1.35rem;font-weight:300;letter-spacing:2px;">
                    Vellovy
                </div>
                <small style="opacity:0.8;font-size:0.72rem;">Gestão Inteligente</small>
            </div>
        </div>

        <nav>
            <ul class="nav-menu" id="nav-menu"></ul>
        </nav>

        <div class="mt-auto" style="padding-top:2rem;border-top:1px solid rgba(255,255,255,0.2);">
            <button class="btn btn-sm" id="btn-theme-toggle"
                style="width:100%;background:rgba(255,255,255,0.1);color:white;margin-bottom:0.5rem;">
                Alternar Tema
            </button>
            <button class="btn btn-sm btn-danger" id="btn-logout" style="width:100%;">
                Sair
            </button>
        </div>
    </aside>

    <main class="main-content">
        <!-- Page Header -->
        <div class="header">
            <div>
                <h1 id="page-title" style="font-weight:300;font-size:1.7rem;color:var(--txt-dark);">
                    Dashboard
                </h1>
                <div id="badge-mes" style="font-size:0.83rem;color:var(--txt-muted);margin-top:0.2rem;"></div>
            </div>
            <div style="display:flex;align-items:center;gap:1rem;">
                <div id="user-info" style="text-align:right;">
                    <div id="user-email" style="font-size:0.88rem;font-weight:500;"></div>
                    <div id="salao-name" style="font-size:0.78rem;color:var(--txt-muted);"></div>
                </div>
            </div>
        </div>

        <!-- Pages -->
        <div id="pages-container">
            <div id="page-dashboard"      class="page fade-in"></div>
            <div id="page-agenda"         class="page hidden"></div>
            <div id="page-diario"         class="page hidden"></div>
            <div id="page-servicos"       class="page hidden"></div>
            <div id="page-clientes"       class="page hidden"></div>
            <div id="page-custos"         class="page hidden"></div>
            <div id="page-receitas"       class="page hidden"></div>
            <div id="page-controle"       class="page hidden"></div>
            <div id="page-relatorio"      class="page hidden"></div>
            <div id="page-configuracoes"  class="page hidden"></div>
        </div>
    </main>
</div>

<!-- ── Modal (desktop forms) ── -->
<div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modal-title">Título</h3>
            <button class="modal-close" onclick="window.__closeModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                     fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div id="modal-body"   class="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>
</div>

<!-- ── Bottom Navigation (mobile) ── -->
<nav class="bottom-nav" id="bottom-nav">
    <ul class="bottom-nav-items" id="bottom-nav-items"></ul>
</nav>

<!-- ── Bottom Sheet (mobile forms) ── -->
<div class="sheet-overlay" id="sheet-overlay" onclick="window.__closeSheet()"></div>
<div class="sheet" id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
        <span class="sheet-title" id="sheet-title">Formulário</span>
        <button class="sheet-close" onclick="window.__closeSheet()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6"  y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
</div>

<!-- ── Confirm Dialog ── -->
<div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
        <div class="confirm-title" id="confirm-title">Confirmar ação</div>
        <div class="confirm-msg"   id="confirm-msg">Esta ação não pode ser desfeita.</div>
        <div class="confirm-actions">
            <button class="btn btn-secondary" id="confirm-cancel">Cancelar</button>
            <button class="btn btn-danger"    id="confirm-ok">Remover</button>
        </div>
    </div>
</div>

<!-- ── Toast Container ── -->
<div id="toast-container"
     style="position:fixed;bottom:20px;right:20px;z-index:3000;
            display:flex;flex-direction:column;gap:10px;pointer-events:none;">
</div>

<script type="module" src="app.js"></script>
</body>
</html>
